services:
  # --- FastAPI Backend ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoiceforge-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://invoiceforge:invoiceforge@postgres:5432/invoiceforge
      - REDIS_URL=redis://redis:6379/0
      - KOSIT_VALIDATOR_URL=http://kosit-validator:8080
      - STORAGE_BASE_PATH=/app/data/storage
      - SCHEMA_DIR=/app/data/schemas
    volumes:
      - storage_data:/app/data/storage
      - schema_data:/app/data/schemas
    networks:
      - default
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # --- Streamlit Frontend ---
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoiceforge-ui
    command: ["streamlit", "run", "ui/streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.headless=true"]
    ports:
      - "8501:8501"
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://invoiceforge:invoiceforge@postgres:5432/invoiceforge
      - REDIS_URL=redis://redis:6379/0
      - KOSIT_VALIDATOR_URL=http://kosit-validator:8080
      - STORAGE_BASE_PATH=/app/data/storage
      - SCHEMA_DIR=/app/data/schemas
    volumes:
      - storage_data:/app/data/storage
      - schema_data:/app/data/schemas
    networks:
      - default
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # --- ARQ Background Worker ---
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoiceforge-worker
    command: ["python", "-m", "arq", "app.worker.settings.WorkerSettings"]
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://invoiceforge:invoiceforge@postgres:5432/invoiceforge
      - REDIS_URL=redis://redis:6379/0
      - KOSIT_VALIDATOR_URL=http://kosit-validator:8080
      - STORAGE_BASE_PATH=/app/data/storage
      - SCHEMA_DIR=/app/data/schemas
    volumes:
      - storage_data:/app/data/storage
      - schema_data:/app/data/schemas
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: invoiceforge-postgres
    environment:
      POSTGRES_USER: invoiceforge
      POSTGRES_PASSWORD: invoiceforge
      POSTGRES_DB: invoiceforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No external ports – only reachable via Docker network
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoiceforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: invoiceforge-redis
    # No external ports – only reachable via Docker network
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Ollama LLM Server (optional) ---
  # Activate with: docker compose --profile llm up
  ollama:
    image: ollama/ollama:latest
    container_name: invoiceforge-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    profiles:
      - llm

  # --- KoSIT Validator (optional, for full Schematron validation) ---
  # Activate with: docker compose --profile full up
  kosit-validator:
    image: eclipse-temurin:21-jre-alpine
    container_name: invoiceforge-kosit
    command: >
      sh -c "
        if [ ! -f /opt/kosit/validationtool-*-standalone.jar ]; then
          apk add --no-cache curl unzip &&
          mkdir -p /opt/kosit /opt/kosit/config &&
          curl -L -o /tmp/validator.zip https://github.com/itplr-kosit/validator/releases/download/v1.6.0/validator-1.6.0-distribution.zip &&
          unzip -o /tmp/validator.zip -d /opt/kosit &&
          curl -L -o /tmp/config.zip https://github.com/itplr-kosit/validator-configuration-xrechnung/releases/download/release-2024-06-28/validator-configuration-xrechnung_3.0.2_2024-06-28.zip &&
          unzip -o /tmp/config.zip -d /opt/kosit/config &&
          rm -f /tmp/validator.zip /tmp/config.zip;
        fi &&
        java -jar /opt/kosit/validationtool-*-standalone.jar -s /opt/kosit/config/scenarios.xml -D -H 0.0.0.0 -P 8080
      "
    ports:
      - "8080:8080"
    volumes:
      - kosit_data:/opt/kosit
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    profiles:
      - full

networks:
  backend:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  storage_data:
  schema_data:
  kosit_data:
  ollama_data:
