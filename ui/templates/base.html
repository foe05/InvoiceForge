<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}InvoiceForge{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body hx-boost="true">
    <nav class="navbar">
        <div class="container">
            <a href="/" class="brand">InvoiceForge</a>
            <div class="nav-links">
                <a href="/" {% if active_page == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
                <a href="/ui/convert" {% if active_page == 'convert' %}class="active"{% endif %}>Konvertieren</a>
                <a href="/ui/extract" {% if active_page == 'extract' %}class="active"{% endif %}>Extrahieren</a>
                <a href="/ui/validate" {% if active_page == 'validate' %}class="active"{% endif %}>Validieren</a>
                <a href="/api/docs" target="_blank">API Docs</a>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            InvoiceForge v{{ version }} &mdash; Open-Source E-Rechnungs-Konverter
        </div>
    </footer>
</body>
</html>
